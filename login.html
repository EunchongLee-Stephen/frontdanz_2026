<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body class="auth-page">
    <header class="gnb">
      <div class="gnb-inner">
        <a href="index.html" class="gnb-logo">
          <img src="assets/logo_icon.png" alt="PET35" />
        </a>
        <nav class="gnb-nav">
          <a href="signup.html" class="gnb-btn-signup">회원가입</a>
        </nav>
      </div>
    </header>

    <div class="auth-card">
      <h1 class="auth-card-title">로그인</h1>
      <p class="auth-card-sub">PET35에 오신 것을 환영합니다</p>
      <div class="auth-divider"></div>

      <form>
        <div class="auth-fields">
          <div class="auth-field">
            <label class="form-label">아이디</label>
            <input
              class="form-input"
              type="text"
              placeholder="아이디를 입력하세요."
            />
          </div>

          <div class="auth-field">
            <label class="form-label">비밀번호</label>
            <input
              class="form-input"
              type="password"
              placeholder="비밀번호를 입력하세요."
            />
          </div>

          <p class="auth-forgot">비밀번호를 잊으셨나요?</p>
        </div>

        <button
          class="auth-submit"
          type="button"
          onclick="location.href = 'mypage.html'"
        >
          로그인
        </button>
      </form>
    </div>
  </body>
</html>
