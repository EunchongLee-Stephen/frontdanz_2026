<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body class="auth-page">
    <header class="gnb">
      <div class="gnb-inner">
        <a href="index.html" class="gnb-logo">
          <img src="assets/logo_icon.png" alt="PET35" />
        </a>
        <nav class="gnb-nav">
          <a href="login.html">로그인</a>
        </nav>
      </div>
    </header>

    <div class="auth-card">
      <h1 class="auth-card-title">회원가입</h1>
      <p class="auth-card-sub">PET35에 오신 것을 환영합니다</p>
      <div class="auth-divider"></div>

      <form>
        <div class="auth-fields">
          <div class="auth-field">
            <label class="form-label">이름</label>
            <input
              class="form-input"
              type="text"
              placeholder="이름을 입력하세요."
            />
          </div>

          <div class="auth-field">
            <label class="form-label">생년월일</label>
            <input class="form-input" type="text" placeholder="YYYY.MM.DD" />
          </div>

          <div class="auth-field">
            <label class="form-label">아이디</label>
            <input
              class="form-input"
              type="text"
              placeholder="아이디를 입력하세요."
            />
          </div>

          <div class="auth-field">
            <label class="form-label">비밀번호</label>
            <input
              class="form-input"
              type="password"
              placeholder="비밀번호 입력"
            />
          </div>

          <div class="auth-field">
            <label class="form-label">비밀번호 확인</label>
            <input
              class="form-input"
              type="password"
              placeholder="비밀번호 확인"
            />
          </div>

          <div class="auth-agree">
            <input type="checkbox" />
            <span>약관에 동의합니다.</span>
          </div>
        </div>

        <button
          class="auth-submit"
          type="button"
          onclick="location.href = 'mypage.html'"
        >
          회원가입
        </button>
      </form>
    </div>
  </body>
</html>
